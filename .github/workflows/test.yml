name: Test

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  liquidity-venues:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Run liquidity venue tests
        run: pnpm test:liquidity-venues
        env:
          RPC_URL_1: ${{ secrets.RPC_URL_1 }}
          RPC_URL_999: ${{ secrets.RPC_URL_999 }}

  pricers:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Run pricers tests
        run: pnpm test:pricers
        env:
          RPC_URL_1: ${{ secrets.RPC_URL_1 }}

  bot:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Run liquidation execution tests
        run: pnpm test:bot
        env:
          RPC_URL_1: ${{ secrets.RPC_URL_1 }}

  hyperindex:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up pnpm
        uses: pnpm/action-setup@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: pnpm
      - name: Install dependencies
        run: pnpm i --frozen-lockfile
      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable
      - name: Restore indexer cache
        id: indexer-cache
        uses: actions/cache@v4
        with:
          path: /tmp/envio-postgres-data.tar
          key: envio-indexer-v1
      - name: Import cached volume
        if: steps.indexer-cache.outputs.cache-hit == 'true'
        run: |
          docker volume create envio-postgres-data
          docker run --rm -v envio-postgres-data:/data -v /tmp:/backup alpine tar xf /backup/envio-postgres-data.tar -C /data
      - name: Run hyperindex tests
        run: pnpm test:hyperindex
        env:
          RPC_URL_1: ${{ secrets.RPC_URL_1 }}
      - name: Export volume for cache
        if: always()
        run: |
          docker run --rm -v envio-postgres-data:/data -v /tmp:/backup alpine tar cf /backup/envio-postgres-data.tar -C /data .
